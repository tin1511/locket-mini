<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Locket Mini</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.app{
  width:320px;
  height:560px;
  background:#111;
  border-radius:30px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.header{
  color:white;
  text-align:center;
  font-size:18px;
}

.camera{
  flex:1;
  background:#222;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#aaa;
  overflow:hidden;
}

.camera img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:10px;
}

.btn{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:22px;
}

.camera-btn{
  background:white;
  color:black;
}

.post-btn{
  background:#1877f2;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">Locket Mini 📸</div>

  <div class="camera" id="camera">
    Chưa có ảnh
  </div>

  <input type="file" id="file" accept="image/*" hidden>

  <div class="controls">
    <div class="btn camera-btn" onclick="takePhoto()">📷</div>
    <div class="post-btn" onclick="postPhoto()">POST</div>
  </div>
</div>

<script>
let selectedFile = null;

// mở chọn ảnh
function takePhoto(){
  document.getElementById("file").click();
}

// chọn ảnh → preview
document.getElementById("file").onchange = function(e){
  const file = e.target.files[0];
  if(!file) return;

  selectedFile = file;

  const reader = new FileReader();
  reader.onload = function(){
    document.getElementById("camera").innerHTML =
      `<img src="${reader.result}">`;
  };
  reader.readAsDataURL(file);
};

// bấm POST → upload thật
async function postPhoto(){
  if(!selectedFile){
    alert("Chọn ảnh trước!");
    return;
  }

  const formData = new FormData();
  formData.append("photo", selectedFile);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  alert("Đã đăng ảnh 😎");

  // reset
  selectedFile = null;
}
</script>

</body>
</html>
