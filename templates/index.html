<h2>Xin chào {{user}}</h2>
<a href="/logout">Logout</a>

<form method="POST" action="/post" enctype="multipart/form-data">
<input type="file" name="photo">
<input name="caption" placeholder="Viết gì đó...">
<button>Post</button>
</form>

<hr>

{% for p in posts %}
<div>
    <h3>{{p[1]}}</h3>
    <img src="/{{p[2]}}" width="300">
    <p>{{p[3]}}</p>

    {% if p[1] == user %}
    <a href="/delete/{{p[0]}}">❌ Xoá</a>
    {% endif %}
</div>
<hr>
{% endfor %}
